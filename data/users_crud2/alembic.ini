# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# within the migration filename as generated by the "revision" command
# if default, will use the timezone of the local machine
# timezone =

# sys.path to use, relative to this file.
# prepend the app directory
prepend_sys_path = .

# sqlalchemy.url = driver://user:pass@localhost/dbname
sqlalchemy.url = sqlite:///users_db.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
